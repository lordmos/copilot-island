name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen --quiet

      - name: Generate Xcode Project
        run: xcodegen generate

      # ── Import Developer ID certificate from GitHub Secrets ─────────────────
      # Required secrets:
      #   APPLE_CERTIFICATE          — base64-encoded .p12 (Developer ID Application)
      #   APPLE_CERTIFICATE_PASSWORD — .p12 export password
      #   APPLE_TEAM_ID              — 10-character Apple Team ID
      #   APPLE_ID                   — Apple ID email (for notarytool)
      #   APPLE_APP_PASSWORD         — App-Specific Password from appleid.apple.com
      - name: Import certificate
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # ── Archive ─────────────────────────────────────────────────────────────
      - name: Archive
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          if [ "$HAS_CERT" = "true" ]; then
            # Signed build with Developer ID
            xcodebuild archive \
              -scheme CopilotIsland \
              -configuration Release \
              -archivePath "$RUNNER_TEMP/CopilotIsland.xcarchive" \
              "OTHER_CODE_SIGN_FLAGS=--keychain $KEYCHAIN_PATH" \
              -quiet
          else
            # Ad-hoc signed build (no Developer ID)
            xcodebuild archive \
              -scheme CopilotIsland \
              -configuration Release \
              -archivePath "$RUNNER_TEMP/CopilotIsland.xcarchive" \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=YES \
              CODE_SIGNING_ALLOWED=YES \
              -quiet
          fi

      # ── Package DMG ─────────────────────────────────────────────────────────
      - name: Package DMG
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP=$(find "$RUNNER_TEMP/CopilotIsland.xcarchive/Products" -name "CopilotIsland.app" | head -1)
          if [ -z "$APP" ]; then
            echo "❌ Could not locate CopilotIsland.app in archive"; exit 1
          fi

          if [ "$HAS_CERT" != "true" ]; then
            codesign --force --deep --sign - "$APP"
          fi

          DMG_PATH="$RUNNER_TEMP/CopilotIsland-${VERSION}.dmg"
          mkdir -p /tmp/dmg_staging
          cp -R "$APP" /tmp/dmg_staging/
          ln -s /Applications /tmp/dmg_staging/Applications

          hdiutil create \
            -volname "Copilot Island ${VERSION}" \
            -srcfolder /tmp/dmg_staging \
            -ov -format UDZO \
            "$DMG_PATH"

          if [ "$HAS_CERT" = "true" ]; then
            codesign --force --sign "Developer ID Application" "$DMG_PATH"
          fi

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "DMG_NAME=CopilotIsland-${VERSION}.dmg" >> "$GITHUB_ENV"

      # ── Notarize + Staple (only when Developer ID cert is present) ───────────
      - name: Notarize DMG
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Copilot Island ${{ github.ref_name }}"
          body: |
            ## Copilot Island ${{ github.ref_name }}

            ### Install
            1. Download `${{ env.DMG_NAME }}` below
            2. Open the DMG and drag **Copilot Island.app** to your Applications folder
            3. Launch — the app lives in your MacBook notch ✨

            ### Requirements
            - macOS 14.0+ (Sonoma or later)
            - MacBook with notch (2021 or later)
            - GitHub Copilot CLI installed and authenticated

            ### What's New
            See [CHANGELOG](https://github.com/lordmos/copilot-island/blob/main/CHANGELOG.md) for details.
          files: ${{ env.DMG_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
