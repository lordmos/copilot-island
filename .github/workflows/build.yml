name: CI Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (Debug, no signing)
        run: |
          xcodebuild \
            -scheme CopilotIsland \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      # Archive & export require APPLE_CERTIFICATE + APPLE_CERTIFICATE_PASSWORD secrets.
      # Set them in repo Settings → Secrets to enable release builds.
      - name: Archive for Release
        if: github.ref == 'refs/heads/main' && env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          xcodebuild \
            -scheme CopilotIsland \
            -configuration Release \
            -archivePath ./CopilotIsland.xcarchive \
            archive

      - name: Export .app
        if: github.ref == 'refs/heads/main' && env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ./CopilotIsland.xcarchive \
            -exportPath ./dist \
            -exportOptionsPlist scripts/ExportOptions.plist

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: CopilotIsland-${{ github.sha }}
          path: dist/CopilotIsland.app
