<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6E40C9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F6FEB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="notch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />

  <!-- MacBook screen shape -->
  <rect x="30" y="55" width="140" height="100" rx="8" fill="url(#notch)" opacity="0.9"/>

  <!-- Notch -->
  <rect x="75" y="51" width="50" height="16" rx="8" fill="#0D1117"/>

  <!-- Copilot logo octocat simplified: circle + dots -->
  <circle cx="100" cy="105" r="22" fill="none" stroke="#6E40C9" stroke-width="3" filter="url(#glow)"/>
  <circle cx="100" cy="105" r="22" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>

  <!-- Copilot "C" letter stylized -->
  <text x="100" y="112" text-anchor="middle" font-family="SF Pro, system-ui, sans-serif"
        font-size="22" font-weight="700" fill="#A78BFA" filter="url(#glow)">✦</text>

  <!-- Pulsing dot in notch -->
  <circle cx="100" cy="59" r="3.5" fill="#00D4FF" opacity="0.9" filter="url(#glow)"/>

  <!-- Small orbit dots -->
  <circle cx="72" cy="97" r="2.5" fill="#6E40C9" opacity="0.7"/>
  <circle cx="128" cy="97" r="2.5" fill="#6E40C9" opacity="0.7"/>
  <circle cx="88" cy="128" r="2" fill="#1F6FEB" opacity="0.6"/>
  <circle cx="112" cy="128" r="2" fill="#1F6FEB" opacity="0.6"/>
</svg>
