<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: diagonal dark forest gradient — userSpaceOnUse so notch can reuse it seamlessly -->
    <linearGradient id="bggrad" x1="154" y1="0" x2="870" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#132018"/>
      <stop offset="100%" stop-color="#080D0B"/>
    </linearGradient>
    <!-- Screen: rich sage-to-deep-green gradient -->
    <linearGradient id="screenbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6BBA94"/>
      <stop offset="100%" stop-color="#2F7356"/>
    </linearGradient>
  </defs>

  <!-- Squircle background with diagonal forest gradient -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bggrad)"/>

  <!-- Sage green screen -->
  <rect x="108" y="210" width="808" height="600" rx="28" fill="url(#screenbg)"/>

  <!-- Screen border — subtle white inner glow -->
  <rect x="108" y="210" width="808" height="600" rx="28" fill="none"
        stroke="rgba(255,255,255,0.14)" stroke-width="2"/>

  <!-- Notch: flat top flush with screen, rounded bottom corners — real MacBook notch shape -->
  <path d="M 297,210 H 727 V 300 Q 727,355 672,355 H 352 Q 297,355 297,300 Z" fill="#000000"/>

  <!-- Camera LED dot inside notch -->
  <circle cx="512" cy="282" r="7" fill="#6BBA94" opacity="0.6"/>
  <circle cx="512" cy="282" r="3" fill="#B8F5D4"/>

  <!-- Copilot logo in deep-forest colour — "carved into screen" effect -->
  <g transform="translate(327.0,397.5) scale(23.125)" fill="#0A1510" opacity="0.90">
