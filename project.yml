# XcodeGen Project Definition
# Install: brew install xcodegen
# Generate: cd copilot-island-project && xcodegen generate

name: CopilotIsland
options:
  bundleIdPrefix: studio.lordmos
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: 14.0
    PRODUCT_BUNDLE_IDENTIFIER: studio.lordmos.copilot.island
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "" # Set your Apple Team ID here
    INFOPLIST_FILE: CopilotIsland/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: CopilotIsland/Resources/CopilotIsland.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.3.0"

targets:
  CopilotIsland:
    type: application
    platform: macOS
    sources:
      - path: CopilotIsland
        excludes:
          - "**/*.md"
    resources:
      - CopilotIsland/Assets.xcassets
      - CopilotIsland/Resources/Info.plist
      - CopilotIsland/Resources/CopilotIsland.entitlements
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.lordmos.copilot.island
